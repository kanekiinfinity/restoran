<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECO-FAMILY RESTAURANT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: #272727;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 560px;
      background: #272727;
      position: relative;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 162px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1530, #241f3d, #0d0b16);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.7;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 80, 140, .35), transparent 40%),
        radial-gradient(circle at 75% 60%, rgba(80, 180, 255, .25), transparent 45%),
        radial-gradient(circle at 50% 85%, rgba(120, 255, 170, .2), transparent 40%);
    }

    .hero-label {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .4);
    }

    .header-card {
      position: relative;
      margin-top: -32px;
      border-radius: 24px 24px 0 0;
      background: #181818;
      padding: 24px 16px 8px;
    }

    .restaurant-name {
      font-size: 32px;
      line-height: 1.4;
      font-weight: 400;
      color: #dedede;
      padding-bottom: 4px;
    }

    .contact-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding-bottom: 8px;
      text-decoration: none;
    }

    .contact-row svg {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .contact-row span {
      font-size: 14px;
      line-height: 1.4;
      color: #676767;
    }

    /* ── Back button ── */
    #back-btn {
      display: none;
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: rgba(0, 0, 0, .45);
      backdrop-filter: blur(4px);
      color: #fff;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }

    #back-btn:hover {
      background: rgba(0, 0, 0, .65);
    }

    #back-btn.visible {
      display: flex;
    }

    /* ── Filter pills ── */
    .filter-wrap {
      position: relative;
      background: #181818;
      padding-bottom: 24px;
    }

    .filter-scroll {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 16px 16px 16px;
      scrollbar-width: none;
    }

    .filter-scroll::-webkit-scrollbar {
      display: none;
    }

    .filter-fade {
      pointer-events: none;
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 40px;
      background: linear-gradient(to right, transparent, #181818);
    }

    .pill {
      flex-shrink: 0;
      white-space: nowrap;
      border-radius: 9999px;
      border: 3px solid #858585;
      padding: 7px 13px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.15;
      cursor: pointer;
      transition: all .15s ease-out;
      background: #181818;
      color: #858585;
      font-family: 'Rubik', sans-serif;
    }

    .pill:hover {
      background: #2a2a2a;
      color: #dedede;
      border-color: #dedede;
      transform: scale(1.05);
    }

    .pill.active {
      background: #858585;
      color: #181818;
      border-color: #858585;
    }

    /* ── Search ── */
    .search-wrap {
      display: flex;
      align-items: center;
      height: 64px;
      background: #181818;
      padding: 0 16px;
    }

    .search-inner {
      position: relative;
      flex: 1;
    }

    .search-input {
      width: 100%;
      border-radius: 9999px;
      border: 2px solid transparent;
      background: #252424;
      padding: 12px 48px 12px 16px;
      font-size: 16px;
      font-family: 'Rubik', sans-serif;
      color: #dedede;
      outline: none;
    }

    .search-input::placeholder {
      color: #757575;
    }

    .search-btn {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #181818;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #dedede;
    }

    /* ── Category list ── */
    #cat-list {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #181818;
      padding: 16px 16px 100px;
    }

    .empty-msg {
      padding: 32px 0;
      text-align: center;
      font-size: 14px;
      color: #676767;
    }

    .cat-card {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
    }

    .cat-card-inner {
      position: relative;
      aspect-ratio: 528/176;
      overflow: hidden;
      border-radius: 26px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .3);
    }

    .cat-card-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .3s ease-out;
    }

    .cat-card-grad-bg {
      position: absolute;
      inset: 0;
      transition: transform .3s ease-out;
    }

    .cat-card:hover .cat-card-img,
    .cat-card:hover .cat-card-grad-bg {
      transform: scale(1.05);
    }

    .cat-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, .05) 0%, rgba(0, 0, 0, .55) 100%);
      transition: opacity .3s;
    }

    .cat-card:hover .cat-overlay {
      opacity: 0.8;
    }

    .cat-title-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .cat-title {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .4);
      transition: transform .3s;
    }

    .cat-card:hover .cat-title {
      transform: translateX(4px);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: center;
      background: #181818;
      padding: 16px 0 80px;
    }

    .footer span {
      font-size: 12px;
      color: #676767;
    }

    /* ── Detail view ── */
    #detail-view {
      display: none;
      background: #181818;
      padding: 20px 16px 120px;
      animation: fade-in 220ms ease-out;
    }

    #detail-view.visible {
      display: block;
    }

    .detail-cat-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #858585;
      margin-bottom: 16px;
    }

    .dish-row {
      padding-bottom: 24px;
      animation: row-in 280ms ease-out both;
    }

    .dish-photo {
      aspect-ratio: 528/352;
      width: 100%;
      overflow: hidden;
      border-radius: 20px;
      background: #252525;
      margin-bottom: 12px;
    }

    .dish-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .dish-name-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .dish-name {
      font-size: 16px;
      font-weight: 600;
      color: #dedede;
    }

    .dish-weight {
      flex-shrink: 0;
      font-size: 14px;
      color: #757575;
    }

    .dish-desc {
      margin-top: 4px;
      font-size: 14px;
      color: #676767;
    }

    .dish-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .dish-price {
      font-size: 24px;
      font-weight: 600;
      color: #dedede;
    }

    .dish-price span {
      font-size: 14px;
      font-weight: 400;
      color: #757575;
      margin-left: 4px;
    }

    /* ── Quantity controls ── */
    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .qty-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #2a2a2a;
      color: #dedede;
      font-size: 20px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      font-family: 'Rubik', sans-serif;
      flex-shrink: 0;
    }

    .qty-btn:hover {
      background: #3a3a3a;
    }

    .qty-btn:active {
      background: #454545;
      transform: scale(0.92);
    }

    .qty-num {
      min-width: 32px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: #dedede;
    }

    /* add-only button (when qty=0) */
    .add-only-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #2a2a2a;
      color: #dedede;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }

    .add-only-btn:hover {
      background: #3a3a3a;
    }

    .add-only-btn:active {
      background: #454545;
      transform: scale(0.92);
    }

    /* ── Cart bar (bottom) ── */
    #cart-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 560px;
      z-index: 100;
      padding: 10px 16px 16px;
      background: linear-gradient(to top, #181818 70%, transparent);
    }

    #cart-bar.visible {
      display: block;
    }

    #cart-bar-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: #dedede;
      color: #181818;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Rubik', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s;
    }

    #cart-bar-btn:hover {
      background: #ececec;
    }

    #cart-bar-btn:active {
      background: #c8c8c8;
    }

    /* ── Order page ── */
    #order-view {
      display: none;
      background: #181818;
      padding: 20px 16px 40px;
      animation: fade-in 220ms ease-out;
      min-height: 60vh;
    }

    #order-view.visible {
      display: block;
    }

    .order-title {
      font-size: 20px;
      font-weight: 600;
      color: #dedede;
      margin-bottom: 20px;
    }

    .order-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .order-item-name {
      font-size: 14px;
      font-weight: 600;
      color: #dedede;
      margin-bottom: 6px;
    }

    .order-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .order-item-price {
      font-size: 18px;
      font-weight: 600;
      color: #dedede;
    }

    .order-item-price span {
      font-size: 12px;
      font-weight: 400;
      color: #757575;
      margin-left: 3px;
    }

    .order-total-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #3a3a3a;
    }

    .order-total-label {
      font-size: 16px;
      font-weight: 600;
      color: #dedede;
    }

    .order-total-price {
      font-size: 28px;
      font-weight: 700;
      color: #dedede;
    }

    .order-total-price span {
      font-size: 14px;
      font-weight: 400;
      color: #757575;
      margin-left: 4px;
    }

    .order-empty {
      text-align: center;
      padding: 48px 0;
      font-size: 15px;
      color: #676767;
    }

    /* ── Animations ── */
    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes row-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cat-card {
      animation: fade-in .22s ease-out both;
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- Header (always visible) -->
    <div style="position:relative" id="header-section">
      <div class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-label">Restaurant ambience</div>
      </div>

      <button id="back-btn" aria-label="Назад" onclick="handleBack()">
        <svg width="20" height="20" fill="none" viewBox="0 0 16 16">
          <path d="M10 13 5 8l5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <div class="header-card">
        <h1 class="restaurant-name">ECO-FAMILY RESTAURANT</h1>
        <div style="padding-top:4px; padding-bottom:8px">
          <a href="https://www.google.com/maps/dir/?api=1&destination=41.5263089,60.7070183&travelmode=driving" class="contact-row" target="_blank" rel="noopener">
            <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
              <path
                d="M8 1.5C5.24 1.5 3 3.74 3 6.5c0 3.5 5 8 5 8s5-4.5 5-8c0-2.76-2.24-5-5-5Zm0 7a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"
                fill="#676767" />
            </svg>
            <span>Ургенчский район,Хорезмская область, Узбекистан</span>
          </a>
          <a href="tel:+998914250507" class="contact-row">
            <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
              <path
                d="M3.5 2h2.4l1 3-1.5 1a8 8 0 0 0 4.1 4.1l1-1.5 3 1v2.4c0 .6-.5 1-1 1C7.6 13 3 8.4 2.5 3c0-.5.4-1 1-1Z"
                fill="#676767" />
            </svg>
            <span>+998 91 425 05 07</span>
          </a>
          <a href="https://www.instagram.com/eco_family_dacha_urgench_/" target="_blank" rel="noopener"
            class="contact-row" style="padding-bottom:4px">
            <svg width="18" height="18" fill="none" viewBox="0 0 18 18">
              <rect x="2" y="2" width="14" height="14" rx="4" stroke="#858585" stroke-width="1.4" />
              <circle cx="9" cy="9" r="3.2" stroke="#858585" stroke-width="1.4" />
              <circle cx="13.2" cy="4.8" r="0.9" fill="#858585" />
            </svg>
            <span>Eco-family-dacha</span>
          </a>
        </div>
      </div>
    </div>

    <!-- VIEW 1: Main category list -->
    <div id="main-view">
      <div class="filter-wrap">
        <div class="filter-scroll" id="filter-pills"></div>
        <div class="filter-fade"></div>
      </div>
      <div class="search-wrap">
        <div class="search-inner">
          <input class="search-input" id="search-input" type="text" placeholder="Поиск"
            oninput="onSearch(this.value)" />
          <button class="search-btn" type="button">
            <svg width="20" height="20" fill="none" viewBox="0 0 20 20">
              <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6" />
              <path d="M14 14L17.5 17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>
      <div id="cat-list"></div>
    </div>

    <!-- VIEW 2: Category detail -->
    <div id="detail-view"></div>

    <!-- VIEW 3: Order page -->
    <div id="order-view">
      <div class="order-title">МОЙ ЗАКАЗ:</div>
      <div id="order-items"></div>
      <div id="order-total"></div>
      <div class="footer" style="margin-top:24px"><span>oddmenu.com</span></div>
    </div>

    <!-- Cart bar (fixed bottom) -->
    <div id="cart-bar">
      <button id="cart-bar-btn" onclick="openOrder()">
        Посмотреть заказ
      </button>
    </div>

  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────────────────────────
    const filters = [
      { id: 'dishes', label: 'Блюда' },
      { id: 'bar', label: 'Бар' },
      { id: 'cold', label: 'Холодный' },
      { id: 'dessert', label: 'Десерт' },
      { id: 'bread', label: 'Хлеб и чай' },
    ]

    const categories = [
      {

          { id: 'salads-6', name: 'Оркошка', weight: 'порция', price: 15000, description: 'Лёгкий овощной салат с зеленью', image: 'https://images.unsplash.com/photo-1540420773420-3366772f4999?w=900&q=80' },

          { id: 'salads-8', name: 'Чакки', weight: 'порция', price: 12000, description: 'Лёгкий йогуртовый салат на основе сузьмы и зелени', image: 'https://images.unsplash.com/photo-1505253716362-afaea1d3d1af?w=900&q=80' },
          { id: 'salads-9', name: 'Айрон', weight: '0.5л', price: 15000, description: 'Освежающий кисломолочный напиток', image: 'https://images.unsplash.com/photo-1563636619-e9143da7973b?w=900&q=80' },

    // ── State ─────────────────────────────────────────────────────────────────────
    let activeFilter = filters[0].id
    let searchQuery = ''
    let selectedCat = null
    // cart: { itemId -> qty }
    const cart = {}
    // current page: 'main' | 'detail' | 'order'
    let currentPage = 'main'

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function fmt(n) { return new Intl.NumberFormat('ru-RU').format(n) }

    function getItemById(id) {
      for (const cat of categories)
        for (const item of cat.items)
          if (item.id === id) return item
      return null
    }

    function cartTotal() {
      let total = 0
      for (const [id, qty] of Object.entries(cart)) {
        const item = getItemById(id)
        if (item) total += item.price * qty
      }
      return total
    }

    function cartCount() {
      return Object.values(cart).reduce((s, q) => s + q, 0)
    }

    function updateCartBar() {
      const bar = document.getElementById('cart-bar')
      const count = cartCount()
      if (count > 0 && currentPage !== 'order') {
        bar.classList.add('visible')
        document.getElementById('cart-bar-btn').textContent = 'Посмотреть заказ'
      } else {
        bar.classList.remove('visible')
      }
    }

    function getVisibleCategories() {
      const q = searchQuery.trim().toLowerCase()
      return categories.filter(cat => {
        if (cat.filterId !== activeFilter) return false
        if (!q) return true
        return (
          cat.title.toLowerCase().includes(q) ||
          cat.items.some(i => i.name.toLowerCase().includes(q))
        )
      })
    }

    // ── Qty controls ──────────────────────────────────────────────────────────────
    function changeQty(itemId, delta) {
      const cur = cart[itemId] || 0
      const next = cur + delta
      if (next <= 0) {
        delete cart[itemId]
      } else {
        cart[itemId] = next
      }
      updateCartBar()
      // re-render the controls for this item everywhere
      rerenderQty(itemId)
      if (currentPage === 'order') renderOrder()
    }

    function rerenderQty(itemId) {
      // update all qty widgets with this itemId on current page
      document.querySelectorAll(`[data-qty-item="${itemId}"]`).forEach(el => {
        const qty = cart[itemId] || 0
        if (qty === 0) {
          el.innerHTML = qtyAddOnlyHTML(itemId)
        } else {
          el.innerHTML = qtyControlsHTML(itemId, qty)
        }
      })
    }

    function qtyAddOnlyHTML(itemId) {
      return `<button class="add-only-btn" onclick="changeQty('${itemId}',1)" aria-label="Добавить">
    <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
      <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>`
    }

    function qtyControlsHTML(itemId, qty) {
      return `<div class="qty-wrap">
    <button class="qty-btn" onclick="changeQty('${itemId}',-1)">−</button>
    <span class="qty-num">${qty}</span>
    <button class="qty-btn" onclick="changeQty('${itemId}',1)">+</button>
  </div>`
    }

    function qtyWidget(itemId) {
      const qty = cart[itemId] || 0
      const html = qty === 0 ? qtyAddOnlyHTML(itemId) : qtyControlsHTML(itemId, qty)
      return `<div data-qty-item="${itemId}">${html}</div>`
    }

    // ── Render pills ──────────────────────────────────────────────────────────────
    function renderPills() {
      const el = document.getElementById('filter-pills')
      el.innerHTML = filters.map(f => `
    <button class="pill${f.id === activeFilter ? ' active' : ''}" onclick="setFilter('${f.id}')">${f.label}</button>
  `).join('')
    }

    // ── Render category list ──────────────────────────────────────────────────────
    function renderCategories() {
      const list = document.getElementById('cat-list')
      const visible = getVisibleCategories()
      if (!visible.length) {
        list.innerHTML = '<p class="empty-msg">Ничего не найдено</p>'
        return
      }
      list.innerHTML = visible.map((cat, i) => {
        const img = cat.items?.[0]?.image
        const bg = img
          ? `<img class="cat-card-img" src="${img}" alt="${cat.title}" loading="lazy" />`
          : `<div class="cat-card-grad-bg" style="background:${cat.gradient}"></div>`
        return `
      <button class="cat-card" style="animation-delay:${i * 40}ms" onclick="openDetail('${cat.id}')">
        <div class="cat-card-inner">
          ${bg}
          <div class="cat-overlay"></div>
          <div class="cat-title-wrap"><h2 class="cat-title">${cat.title}</h2></div>
        </div>
      </button>`
      }).join('')
    }

    // ── Render detail ─────────────────────────────────────────────────────────────
    function renderDetail(cat) {
      const el = document.getElementById('detail-view')
      el.innerHTML = `
    <div class="detail-cat-title">${cat.title}</div>
    ${cat.items.map((item, i) => `
      <div class="dish-row" style="animation-delay:${i * 60}ms">
        <div class="dish-photo">
          ${item.image ? `<img src="${item.image}" alt="${item.name}" loading="lazy" />` : ''}
        </div>
        <div class="dish-name-row">
          <h3 class="dish-name">${item.name}</h3>
          ${item.weight ? `<span class="dish-weight">${item.weight}</span>` : ''}
        </div>
        ${item.description ? `<p class="dish-desc">${item.description}</p>` : ''}
        <div class="dish-price-row">
          <p class="dish-price">${fmt(item.price)}<span>сум</span></p>
          ${qtyWidget(item.id)}
        </div>
      </div>
    `).join('')}
  `
    }

    // ── Render order ──────────────────────────────────────────────────────────────
    function renderOrder() {
      const itemsEl = document.getElementById('order-items')
      const totalEl = document.getElementById('order-total')
      const entries = Object.entries(cart).filter(([, q]) => q > 0)

      if (!entries.length) {
        itemsEl.innerHTML = '<div class="order-empty">Корзина пуста</div>'
        totalEl.innerHTML = ''
        return
      }

      itemsEl.innerHTML = entries.map(([id, qty]) => {
        const item = getItemById(id)
        if (!item) return ''
        return `
      <div class="order-item">
        <div class="order-item-name">${item.name}</div>
        <div class="order-item-row">
          <span class="order-item-price">${fmt(item.price * qty)}<span>сум</span></span>
          ${qtyWidget(id)}
        </div>
      </div>`
      }).join('')

      const total = cartTotal()
      totalEl.innerHTML = `
    <div class="order-total-row">
      <span class="order-total-label">Всего:</span>
      <span class="order-total-price">${fmt(total)}<span>сум</span></span>
    </div>`
    }

    // ── Navigation ────────────────────────────────────────────────────────────────
    function showOnly(page) {
      currentPage = page

      // main-view
      document.getElementById('main-view').style.display = page === 'main' ? '' : 'none'

      // detail-view — keep content when going to order (so back works)
      const dv = document.getElementById('detail-view')
      if (page === 'detail') {
        dv.style.display = ''
        dv.classList.add('visible')
      } else if (page === 'main') {
        // fully reset detail when going home
        dv.style.display = 'none'
        dv.classList.remove('visible')
        dv.innerHTML = ''
      } else {
        // order page — just hide detail visually, keep content
        dv.style.display = 'none'
      }

      // order-view
      const ov = document.getElementById('order-view')
      if (page === 'order') {
        ov.style.display = ''
        ov.classList.add('visible')
      } else {
        ov.style.display = 'none'
        ov.classList.remove('visible')
      }

      document.getElementById('back-btn').classList.toggle('visible', page !== 'main')
      updateCartBar()
    }

    function setFilter(id) {
      activeFilter = id
      renderPills()
      renderCategories()
    }

    function onSearch(val) {
      searchQuery = val
      renderCategories()
    }

    function openDetail(catId) {
      const cat = categories.find(c => c.id === catId)
      if (!cat) return
      selectedCat = cat
      showOnly('detail')
      renderDetail(cat)
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function openOrder() {
      showOnly('order')
      renderOrder()
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function handleBack() {
      if (currentPage === 'order') {
        // go back to wherever we came from
        if (selectedCat) {
          showOnly('detail')
          renderDetail(selectedCat)
        } else {
          showOnly('main')
        }
      } else if (currentPage === 'detail') {
        selectedCat = null
        showOnly('main')
      }
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    renderPills()
    renderCategories()
    updateCartBar()
  </script>
</body>

</html>
